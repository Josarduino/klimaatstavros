<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Stavros Klimaat</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
text-align:center;
}

h1{
margin-top:20px;
}

.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
min-width:200px;
}

.bigTemp{
font-size:60px;
font-weight:bold;
}

.bigHum{
font-size:40px;
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1259a5;
}

.chartContainer{
width:95%;
max-width:1100px;
margin:auto;
}

canvas{
background:white;
border-radius:12px;
padding:10px;
margin-top:20px;
}

@media (max-width:700px){

.bigTemp{
font-size:48px;
}

.bigHum{
font-size:32px;
}

}

</style>
</head>

<body>

<h1>Stavros Klimaat Geschiedenis</h1>

<div class="dashboard">

<div class="card">
<div id="tempNow" class="bigTemp">-- °C</div>
<div id="humNow" class="bigHum">-- %</div>
<div id="lastUpdate"></div>
</div>

<div class="card">
<b>Vandaag</b><br><br>

Temp min: <span id="tmin">-</span> °C<br>
Temp max: <span id="tmax">-</span> °C<br><br>

Vocht min: <span id="hmin">-</span> %<br>
Vocht max: <span id="hmax">-</span> %

</div>

</div>

<div>

<button onclick="loadData(1)">Laatste 24 uur</button>
<button onclick="loadData(7)">Laatste week</button>
<button onclick="loadData(30)">Laatste maand</button>

<button onclick="exportCSV()">CSV export</button>

<button onclick="openRAW()">RAW</button>

</div>

<div class="chartContainer">

<canvas id="tempChart"></canvas>

<canvas id="humChart"></canvas>

</div>

<script>

const channelID = "3285271";
const readKey = "SZBNZBMMVQO88BIT";

let tempChart;
let humChart;
let currentData=[];

function openRAW(){

window.location.href="RAW.html";

setTimeout(()=>{
window.location.href="index.html";
},120000);

}

async function loadData(days){

let results=days==1?720:(days==7?1008:744);

let url=`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=${results}`;

let response=await fetch(url);
let data=await response.json();

let feeds=data.feeds;

let temp=[];
let hum=[];

feeds.forEach(f=>{

let time=new Date(f.created_at);

let t=parseFloat(f.field1);
let h=parseFloat(f.field2);

if(!isNaN(t)) temp.push({x:time,y:t});
if(!isNaN(h)) hum.push({x:time,y:h});

});

currentData=feeds;

processTodayStats(feeds);

updateCurrent(temp,hum);

drawCharts(temp,hum);

}

function processTodayStats(feeds){

let today=new Date();
today.setHours(0,0,0,0);

let temps=[];
let hums=[];

feeds.forEach(f=>{

let time=new Date(f.created_at);

if(time>=today){

let t=parseFloat(f.field1);
let h=parseFloat(f.field2);

if(!isNaN(t)) temps.push(t);
if(!isNaN(h)) hums.push(h);

}

});

if(temps.length){

document.getElementById("tmin").innerText=Math.min(...temps).toFixed(1);
document.getElementById("tmax").innerText=Math.max(...temps).toFixed(1);

}

if(hums.length){

document.getElementById("hmin").innerText=Math.min(...hums).toFixed(1);
document.getElementById("hmax").innerText=Math.max(...hums).toFixed(1);

}

}

function updateCurrent(temp,hum){

let lastT=temp[temp.length-1];
let lastH=hum[hum.length-1];

if(lastT){

document.getElementById("tempNow").innerText=lastT.y.toFixed(1)+" °C";

let time=new Date(lastT.x);

document.getElementById("lastUpdate").innerText=
"Laatste update: "+
time.toLocaleTimeString();

}

if(lastH){

document.getElementById("humNow").innerText=
lastH.y.toFixed(0)+" %";

}

}

function drawCharts(temp,hum){

if(tempChart) tempChart.destroy();
if(humChart) humChart.destroy();

tempChart=new Chart(
document.getElementById("tempChart"),
{
type:"line",
data:{
datasets:[{
label:"Temperatuur",
data:temp,
borderColor:"red",
backgroundColor:"rgba(255,0,0,0.1)",
tension:0.2
}]
},
options:{
responsive:true,
plugins:{
zoom:{
zoom:{
wheel:{enabled:true},
pinch:{enabled:true},
mode:"x"
},
pan:{
enabled:true,
mode:"x"
}
}
},
scales:{
x:{type:"time"}
}
}
});

humChart=new Chart(
document.getElementById("humChart"),
{
type:"line",
data:{
datasets:[{
label:"Vochtigheid",
data:hum,
borderColor:"blue",
backgroundColor:"rgba(0,0,255,0.1)",
tension:0.2
}]
},
options:{
responsive:true,
plugins:{
zoom:{
zoom:{
wheel:{enabled:true},
pinch:{enabled:true},
mode:"x"
},
pan:{
enabled:true,
mode:"x"
}
}
},
scales:{
x:{type:"time"}
}
}
});

}

function exportCSV(){

let csv="time,temp,hum\n";

currentData.forEach(f=>{
csv+=`${f.created_at},${f.field1},${f.field2}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="stavros_klimaat.csv";

a.click();

}

loadData(1);
setInterval(()=>{
loadData(1);
},120000);
</script>

</body>
</html>
